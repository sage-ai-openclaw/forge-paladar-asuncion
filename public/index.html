<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paladar Asunción - Buscador de Restaurantes</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <h1>🍽️ Paladar Asunción</h1>
    <p>Descubre los mejores platos de Asunción y Gran Asunción</p>
  </header>
  
  <nav>
    <a href="/" class="active">Buscar</a>
    <a href="/admin.html">Admin</a>
  </nav>
  
  <main>
    <section id="search-section">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Buscar plato o restaurante...">
        <button id="search-btn">Buscar</button>
      </div>
      
      <div class="filters">
        <select id="cuisine-filter">
          <option value="">Todas las cocinas</option>
        </select>
        
        <select id="zone-filter">
          <option value="">Todas las zonas</option>
        </select>
        
        <select id="price-filter">
          <option value="">Todos los precios</option>
          <option value="0-30000">Hasta ₲30.000</option>
          <option value="30000-60000">₲30.000 - ₲60.000</option>
          <option value="60000-100000">₲60.000 - ₲100.000</option>
          <option value="100000-999999">Más de ₲100.000</option>
        </select>
      </div>
    </section>
    
    <section id="results-section">
      <div id="restaurants-list"></div>
    </section>
  </main>
  
  <script src="/app.js"></script>
</body>
</html>
