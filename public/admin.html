<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Paladar Asunción</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <h1>🍽️ Paladar Asunción</h1>
    <p>Panel de Administración</p>
  </header>
  
  <nav>
    <a href="/">Buscar</a>
    <a href="/admin.html" class="active">Admin</a>
  </nav>
  
  <main>
    <section class="admin-section">
      <h2>Agregar Restaurante</h2>
      <form id="restaurant-form">
        <div class="form-grid">
          <div class="form-group">
            <label>Nombre *</label>
            <input type="text" name="name" required>
          </div>
          <div class="form-group">
            <label>Tipo de cocina</label>
            <input type="text" name="cuisine_type" placeholder="Ej: Paraguaya, Italiana, Asiática">
          </div>
          <div class="form-group">
            <label>Zona</label>
            <input type="text" name="zone" placeholder="Ej: Villa Morra, Centro, San Lorenzo">
          </div>
          <div class="form-group">
            <label>Dirección</label>
            <input type="text" name="address">
          </div>
          <div class="form-group">
            <label>Teléfono</label>
            <input type="text" name="phone" placeholder="Ej: +595 21 123 456">
          </div>
          <div class="form-group">
            <label>Horario</label>
            <input type="text" name="hours" placeholder="Ej: Lun-Dom: 10:00 - 22:00">
          </div>
          <div class="form-group">
            <label>Latitud</label>
            <input type="number" step="any" name="lat">
          </div>
          <div class="form-group">
            <label>Longitud</label>
            <input type="number" step="any" name="lng">
          </div>
          <div class="form-group">
            <label>Precio mínimo</label>
            <input type="number" name="price_range_min" placeholder="Ej: 25000">
          </div>
          <div class="form-group">
            <label>Precio máximo</label>
            <input type="number" name="price_range_max" placeholder="Ej: 80000">
          </div>
        </div>
        <button type="submit" class="btn-primary">Guardar Restaurante</button>
      </form>
    </section>
    
    <section class="admin-section">
      <h2>Restaurantes</h2>
      <div id="restaurants-table"></div>
    </section>
  </main>
  
  <script src="/admin.js"></script>
</body>
</html>
