<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Paladar Asunción</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <h1>🍽️ Paladar Asunción</h1>
    <p>Panel de Administración</p>
  </header>

  <main>
    <section class="admin-section">
      <h2>Agregar Restaurante</h2>
      <form id="restaurantForm">
        <input type="text" id="restName" placeholder="Nombre del restaurante" required>
        <input type="text" id="restCuisine" placeholder="Tipo de cocina (ej: paraguaya, italiana)" required>
        <input type="text" id="restZone" placeholder="Zona (ej: centro, villa morra)" required>
        <input type="text" id="restAddress" placeholder="Dirección">
        <input type="text" id="restPhone" placeholder="Teléfono">
        <button type="submit" class="btn-primary">Agregar Restaurante</button>
      </form>
    </section>

    <section class="admin-section">
      <h2>Agregar Plato al Menú</h2>
      <form id="menuItemForm">
        <select id="selectRestaurant" required>
          <option value="">Seleccionar restaurante</option>
        </select>
        <input type="text" id="dishName" placeholder="Nombre del plato" required>
        <textarea id="dishDesc" placeholder="Descripción"></textarea>
        <input type="number" id="dishPrice" placeholder="Precio (Gs.)" required>
        <input type="text" id="dishCategory" placeholder="Categoría (ej: entrada, principal, postre)">
        <button type="submit" class="btn-primary">Agregar Plato</button>
      </form>
    </section>

    <section class="admin-section">
      <h2>Restaurantes Registrados</h2>
      <div id="restaurantsList"></div>
    </section>
  </main>

  <nav class="main-nav">
    <a href="/">Buscador</a>
    <a href="/admin.html" class="active">Panel Admin</a>
  </nav>

  <script src="/admin.js"></script>
</body>
</html>
